    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsflow - Social News Feed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Newsflow</h1>
                </div>
                <div class="header-actions">
                    <input type="text" id="search-input" class="search-input" placeholder="Search news...">
                    <button class="btn btn--primary btn--sm" id="refresh-btn">Refresh</button>
                </div>
            </div>
        </div>
    </header>

    <div class="breaking-banner" id="breaking-banner">
        <div class="breaking-content">
            <span class="breaking-label">BREAKING</span>
            <span class="breaking-text" id="breaking-text">Fetching latest headlines...</span>
        </div>
    </div>

    <nav class="category-nav">
        <div class="container">
            <div class="category-filters">
                <button class="category-btn active" data-category="general">All</button>
                <button class="category-btn" data-category="world">International</button>
                <button class="category-btn" data-category="business">Business</button>
                <button class="category-btn" data-category="technology">Technology</button>
                <button class="category-btn" data-category="science">Science</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="news-feed" id="news-feed">
                <p style="color: white; text-align: center;">Loading your feed...</p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
